name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          DEPLOY_COMPOSE_FILE: ${{ secrets.DEPLOY_COMPOSE_FILE }}
          DEPLOY_ENV: ${{ secrets.DEPLOY_ENV }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"

          printf '%s\n' "$DEPLOY_ENV" | timeout 60 ssh $SSH_OPTS "${DEPLOY_USER}@${DEPLOY_HOST}" "cat > '${DEPLOY_PATH}/.env'"

          timeout 2700 ssh $SSH_OPTS "${DEPLOY_USER}@${DEPLOY_HOST}" "
            set -euo pipefail
            cd ${DEPLOY_PATH}
            
            # Pull latest code
            echo [deploy] starting in \$(pwd)
            git fetch origin main
            git reset --hard origin/main
            echo [deploy] using commit \$(git rev-parse --short HEAD)

            export DEPLOY_COMPOSE_FILE='${DEPLOY_COMPOSE_FILE}'
            ./scripts/deploy.sh
          "

      - name: Notify on failure
        if: failure()
        run: echo "Deployment failed\! Check logs for details."
